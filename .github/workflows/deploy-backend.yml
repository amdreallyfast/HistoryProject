name: Deploy Backend

on:
  push:
    branches: [main, test]
    paths:
      - 'WebAPI/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and publish
        run: |
          dotnet publish WebAPI/WebAPI/WebAPI.csproj \
            --configuration Release \
            --output ./publish

      - name: Deploy to production (main branch)
        if: github.ref == 'refs/heads/main'
        uses: azure/webapps-deploy@v3
        with:
          app-name: historyprojectapi
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          package: ./publish

      - name: Deploy to testing (test branch)
        if: github.ref == 'refs/heads/test'
        uses: azure/webapps-deploy@v3
        with:
          app-name: historyprojectapi-testing
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_TESTING }}
          package: ./publish
